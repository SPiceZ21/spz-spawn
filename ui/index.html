<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPiceZ Spawn Menu</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app" style="display: none;">
        <!-- Logo (Top Left) -->
        <div class="logo-container">
            <img src="public/logo.png" alt="SPiceZ Logo">
        </div>

        <!-- Player Nametag (Top Right) -->
        <div class="nametag-container">
            <div class="nametag-state" id="player-state">FREEROAM</div>
            <div class="nametag-main">
                <div class="bg-num" id="nametag-bg-num">D</div>
                <img class="nametag-avatar" id="player-avatar" src="https://i.imgur.com/8NzA8m8.png" alt="Avatar">
                <div class="nametag-details">
                    <div class="nametag-top">
                        <span class="nametag-name" id="player-name">RACER NAME</span>
                        <span class="nametag-crew" id="player-crew">SPZ</span>
                    </div>
                    <div class="nametag-bottom">
                        <span class="nametag-license" id="player-license">D CLASS</span>
                        <span class="nametag-playtime" id="playtime-val">00 HRS 00 MINS</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Spawn Selector (Left Panel) -->
        <div class="spawn-left-panel">
            <div class="panel-header">SELECT DEPLOYMENT ZONE</div>
            <div id="location-list">
                <!-- Location items will be generated here -->
            </div>
        </div>

        <!-- Start Button (Bottom Right) -->
        <div class="start-button-container">
            <button id="start-btn" onclick="startSpawn()">
                <span class="btn-text">START</span>
                <svg class="btn-icon" viewBox="0 0 24 24"><path d="M5 3l14 9-14 9v-18z"/></svg>
            </button>
        </div>

        <!-- Background Overlay (Vignette) -->
        <div class="vignette"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
