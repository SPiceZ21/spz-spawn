<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SPZ · Spawn</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<style>
/* ── TOKENS ─────────────────────────────────────────────────── */
@font-face { font-family: 'Panchang'; src: url('fonts/Panchang-Variable.ttf') format('truetype'); font-weight: 100 900; }

:root {
  --color-primary:   #FF6200;
  --color-secondary: #E65800;

  --gray-800: #27272a; --gray-900: #18181b; --gray-950: #09090b;

  --bg-card:     #18181b;
  --bg-elevated: #27272a;

  --border-muted:  rgba(255,255,255,0.07);
  --border-strong: rgba(255,255,255,0.13);

  --text-primary:   #F0F2F5;
  --text-secondary: #A8AEBB;
  --text-muted:     #5C6370;
  --text-faint:     #3A3F4A;

  --radius-sm: 4px; --radius-md: 6px; --radius-lg: 8px;
  --shadow-lg: 0 12px 24px rgba(0,0,0,0.6);
  --shadow-glow: 0 0 20px rgba(255,98,0,0.2), 0 0 0 1px rgba(255,98,0,0.15);

  --font-display: 'Panchang', sans-serif;
  --font-body:    'Inter', system-ui, sans-serif;
  --font-mono:    'JetBrains Mono', monospace;

  --ease-out: cubic-bezier(0,0,0.2,1);
  --dur-fast: 80ms;
  --dur-base: 150ms;
}

/* ── RESET ──────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; }
html, body { margin:0; padding:0; width:100vw; height:100vh; overflow:hidden; background:transparent; font-family:var(--font-body); font-size:13px; color:var(--text-primary); -webkit-font-smoothing:antialiased; }
#root { position:fixed; inset:0; pointer-events:none; }
*::-webkit-scrollbar              { width:5px; }
*::-webkit-scrollbar-track        { background:transparent; }
*::-webkit-scrollbar-thumb        { background:var(--bg-elevated); border-radius:9999px; }

/* ── PANEL POSITIONS ────────────────────────────────────────── */
.player-card   { position:absolute; top:5vh; right:5vw; pointer-events:auto; width:280px; animation:spz-in 300ms var(--ease-out); }
.location-panel{ position:absolute; bottom:8vh; left:5vw; pointer-events:auto; width:300px; animation:spz-in 300ms 60ms both var(--ease-out); }
.start-wrap    { position:absolute; bottom:8vh; right:5vw; pointer-events:auto; animation:spz-in 300ms 120ms both var(--ease-out); }

/* ── SHARED CARD ────────────────────────────────────────────── */
.spz-card { background:var(--bg-card); border:1px solid var(--border-muted); border-radius:var(--radius-lg); box-shadow:var(--shadow-lg); overflow:hidden; }
.card-topbar { background:var(--bg-elevated); border-bottom:1px solid var(--border-muted); padding:6px 12px; display:flex; justify-content:space-between; align-items:center; }
.card-body   { padding:14px 16px; }

/* ── BADGE ──────────────────────────────────────────────────── */
.spz-badge { display:inline-flex; align-items:center; height:20px; padding:0 6px; border-radius:var(--radius-sm); font-family:var(--font-mono); font-size:10px; font-weight:500; letter-spacing:0.05em; text-transform:uppercase; background:rgba(255,255,255,0.05); color:var(--text-secondary); border:1px solid var(--border-muted); }
.spz-badge[data-variant="primary"] { background:rgba(255,98,0,0.12); color:var(--color-primary); border-color:rgba(255,98,0,0.3); }

/* ── AVATAR RING ────────────────────────────────────────────── */
.avatar-ring { width:56px; height:56px; border-radius:50%; border:2px solid var(--color-primary); overflow:hidden; flex-shrink:0; }
.avatar-ring img { width:100%; height:100%; object-fit:cover; }

/* ── PLAYER INFO ────────────────────────────────────────────── */
.player-name { font-family:var(--font-display); font-weight:700; font-size:15px; color:var(--text-primary); letter-spacing:0.02em; text-transform:uppercase; }
.player-meta { display:flex; align-items:center; gap:6px; color:var(--text-muted); margin-top:3px; }

/* ── LOCATION PANEL ─────────────────────────────────────────── */
.panel-title { display:flex; align-items:center; gap:8px; padding:12px 14px 10px; border-bottom:1px solid var(--border-muted); }
.panel-title-text { font-family:var(--font-mono); font-size:11px; letter-spacing:0.12em; text-transform:uppercase; color:var(--text-secondary); }
.loc-list  { max-height:220px; overflow-y:auto; padding:6px 8px; }
.loc-item  { display:flex; align-items:center; gap:12px; padding:10px 12px; border-radius:var(--radius-sm); cursor:pointer; transition:background var(--dur-fast) var(--ease-out); border:1px solid transparent; margin-bottom:2px; }
.loc-item:hover  { background:var(--bg-elevated); }
.loc-item.active { background:var(--bg-elevated); border-color:var(--border-muted); box-shadow:inset 2px 0 0 var(--color-primary); }
.loc-num  { font-family:var(--font-mono); font-size:11px; color:var(--color-primary); font-weight:600; min-width:24px; }
.loc-name { font-size:13px; color:var(--text-primary); font-weight:500; }

/* ── KBD HINT BAR ───────────────────────────────────────────── */
.panel-hint { padding:8px 12px; border-top:1px solid var(--border-muted); display:flex; align-items:center; gap:6px; }
.spz-kbd { display:inline-flex; align-items:center; justify-content:center; min-width:18px; height:18px; padding:0 5px; font-family:var(--font-mono); font-size:10px; font-weight:600; background:rgba(255,255,255,0.05); border:1px solid var(--border-strong); border-bottom-width:2px; border-radius:3px; color:var(--text-secondary); }
.hint-text { font-size:11px; color:var(--text-muted); }
.hint-sep  { color:var(--border-muted); font-size:11px; margin:0 2px; }

/* ── START BUTTON ───────────────────────────────────────────── */
.start-btn { display:inline-flex; align-items:stretch; border:1px solid var(--color-primary); border-radius:var(--radius-md); overflow:hidden; cursor:pointer; box-shadow:var(--shadow-glow); transition:box-shadow var(--dur-base) var(--ease-out); height:44px; }
.start-btn:hover { box-shadow:0 0 28px rgba(255,98,0,0.45), 0 0 0 1px rgba(255,98,0,0.35); }
.start-btn:active { transform:scale(0.98); }
.start-btn-text { background:var(--color-primary); color:#0a0a0a; font-family:var(--font-display); font-weight:700; font-size:14px; letter-spacing:0.06em; text-transform:uppercase; padding:0 20px; display:flex; align-items:center; }
.start-btn-icon { background:rgba(255,98,0,0.15); border-left:1px solid rgba(255,98,0,0.4); display:flex; align-items:center; padding:0 14px; color:var(--color-primary); }

/* ── EYEBROW ────────────────────────────────────────────────── */
.spz-eyebrow { font-family:var(--font-mono); font-size:11px; font-weight:600; letter-spacing:0.12em; text-transform:uppercase; color:var(--text-muted); }
.spz-eyebrow.primary { color:var(--color-primary); }
.spz-mono { font-family:var(--font-mono); font-variant-numeric:tabular-nums; }

/* ── KEYFRAMES ──────────────────────────────────────────────── */
@keyframes spz-in { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/preact@latest/dist/preact.min.js"></script>
<script src="https://unpkg.com/preact@latest/hooks/dist/hooks.umd.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script type="text/babel" src="components/index.jsx"></script>

<script type="text/babel">
/** @jsx h */
const { h, render, Fragment } = preact;
const { useState, useEffect, useRef } = preactHooks;
const { Icon } = window;

/* ── Helpers ─────────────────────────────────────────────────── */
function formatPlaytime(seconds) {
  const hrs  = Math.floor(seconds / 3600);
  const mins = Math.floor((seconds % 3600) / 60);
  return `${String(hrs).padStart(2,'0')} HRS ${String(mins).padStart(2,'0')} MINS`;
}

/* ── App ─────────────────────────────────────────────────────── */
function App() {
  const [visible,  setVisible]  = useState(false);
  const [player,   setPlayer]   = useState({});
  const [spawns,   setSpawns]   = useState([]);
  const [selected, setSelected] = useState(0);
  const listRef = useRef(null);

  /* FiveM message bridge */
  useEffect(() => {
    const handler = (e) => {
      const data = e.data;
      if (data.type === 'show') {
        setPlayer(data.playerData || {});
        setSpawns(data.spawns || []);
        setSelected(0);
        setVisible(true);
      } else if (data.type === 'hide') {
        setVisible(false);
      }
    };
    window.addEventListener('message', handler);
    return () => window.removeEventListener('message', handler);
  }, []);

  /* Keyboard navigation */
  useEffect(() => {
    if (!visible) return;
    const onKey = (e) => {
      const len = Math.max(1, spawns.length);
      if (e.key === 'ArrowDown' || e.key === 's')
        setSelected(i => (i + 1) % len);
      else if (e.key === 'ArrowUp' || e.key === 'w')
        setSelected(i => (i - 1 + len) % len);
      else if (e.key === 'Enter')
        doStart();
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [visible, spawns, selected]);

  /* Auto-scroll active item into view */
  useEffect(() => {
    listRef.current?.querySelector('.active')?.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }, [selected]);

  useEffect(() => { if (window.lucide) window.lucide.createIcons(); });

  const doStart = () => {
    fetch(`https://${GetParentResourceName()}/startSpawn`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ index: selected + 1 }),
    }).catch(() => {});
    setVisible(false);
  };

  if (!visible) return null;

  const licenseClass = player.licenseClass || 'D';

  return (
    <Fragment>
      {/* ── Player Card ─────────────────────────────────────── */}
      <div className="player-card">
        <div className="spz-card">
          <div className="card-topbar">
            <span className="spz-eyebrow primary">{player.stateText || 'IDLE'}</span>
            <span className="spz-badge" data-variant="primary">{licenseClass} CLASS</span>
          </div>
          <div className="card-body" style={{ display:'flex', alignItems:'center', gap:14 }}>
            <div className="avatar-ring">
              <img src={player.avatar || 'https://i.imgur.com/8NzA8m8.png'} alt="" />
            </div>
            <div style={{ flex:1, minWidth:0 }}>
              <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:4, flexWrap:'wrap' }}>
                <span className="player-name">{player.name || 'Racer'}</span>
                {player.crew && <span className="spz-badge" data-variant="primary">{player.crew}</span>}
              </div>
              <div className="player-meta">
                <Icon name="clock" size={11} color="var(--text-muted)" />
                <span className="spz-mono" style={{ fontSize:11 }}>{formatPlaytime(player.playtime || 0)}</span>
              </div>
            </div>
          </div>
        </div>
      </div>

      {/* ── Location Panel ──────────────────────────────────── */}
      <div className="location-panel">
        <div className="spz-card">
          <div className="panel-title">
            <Icon name="map-pin" size={14} color="var(--color-primary)" />
            <span className="panel-title-text">Select Deployment Zone</span>
          </div>
          <div className="loc-list" ref={listRef}>
            {spawns.map((s, i) => (
              <div
                key={i}
                className={`loc-item${i === selected ? ' active' : ''}`}
                onClick={() => setSelected(i)}
              >
                <span className="loc-num">{String(i + 1).padStart(2, '0')}</span>
                <span className="loc-name">{s.label}</span>
              </div>
            ))}
          </div>
          <div className="panel-hint">
            <Icon name="chevron-up"   size={12} color="var(--text-muted)" />
            <Icon name="chevron-down" size={12} color="var(--text-muted)" />
            <span className="hint-text">navigate</span>
            <span className="hint-sep">·</span>
            <span className="spz-kbd">↵</span>
            <span className="hint-text">confirm</span>
          </div>
        </div>
      </div>

      {/* ── Start Button ────────────────────────────────────── */}
      <div className="start-wrap">
        <div className="start-btn" onClick={doStart}>
          <div className="start-btn-text">Spawn</div>
          <div className="start-btn-icon">
            <Icon name="play" size={16} />
          </div>
        </div>
      </div>
    </Fragment>
  );
}

render(<App />, document.getElementById('root'));
</script>
</body>
</html>
