<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPiceZ Spawn Menu</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app" style="display: none;">
        <!-- Logo (Top Left) -->
        <div class="logo-container">
            <img src="public/logo.png" alt="SPiceZ Logo">
        </div>

        <!-- Player Info (Top Right) -->
        <div class="player-info-panel">
            <div class="info-content">
                <span class="player-label">DRIVER</span>
                <h1 id="player-name">RACER NAME</h1>
                <div class="playtime-container">
                    <span id="playtime-val">00 HRS 00 MINS</span>
                </div>
            </div>
            <div class="accent-bar"></div>
        </div>

        <!-- Spawn Selector (Bottom Center) -->
        <div class="spawn-selector-container">
            <div class="selector-header">SELECT SPAWN LOCATION</div>
            <div class="selector-main">
                <button class="nav-btn prev" onclick="prevSpawn()">
                    <svg viewBox="0 0 24 24"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
                </button>
                <div class="spawn-display">
                    <span id="spawn-label">LEGION SQUARE</span>
                </div>
                <button class="nav-btn next" onclick="nextSpawn()">
                    <svg viewBox="0 0 24 24"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
                </button>
            </div>
            <div class="selector-dots" id="selector-dots">
                <!-- Dots will be generated here -->
            </div>
        </div>

        <!-- Start Button (Bottom Right) -->
        <div class="start-button-container">
            <button id="start-btn" onclick="startSpawn()">
                <div class="btn-content">
                    <span class="btn-label">START</span>
                </div>
            </button>
        </div>

        <!-- Background Overlay (Vignette) -->
        <div class="vignette"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
