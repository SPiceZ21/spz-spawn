<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SPZ · Spawn</title>
<link rel="stylesheet" href="spz-ui.css">
<style>
  html, body { width: 100vw; height: 100vh; overflow: hidden; background: transparent; }
  #root { position: fixed; inset: 0; pointer-events: none; }
  .player-card    { position: absolute; top: 5vh; right: 5vw; pointer-events: auto; width: 280px; }
  .location-panel { position: absolute; bottom: 8vh; left: 5vw; pointer-events: auto; width: 300px; }
  .start-wrap     { position: absolute; bottom: 8vh; right: 5vw; pointer-events: auto; }
  .loc-item {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 12px; border-radius: var(--spz-radius-2); cursor: pointer;
    transition: background var(--spz-dur-1) var(--spz-ease-out);
    border: 1px solid transparent; margin-bottom: 2px;
  }
  .loc-item:hover  { background: var(--spz-surface-2); }
  .loc-item.active { background: var(--spz-surface-2); border-color: var(--spz-line); box-shadow: inset 2px 0 0 var(--spz-orange); }
  .loc-num  { font-family: var(--spz-font-mono); font-size: 11px; color: var(--spz-orange); font-weight: 600; min-width: 24px; }
  .loc-name { font-size: 13px; color: var(--spz-fg-1); font-weight: 500; }
  .avatar-ring { width: 56px; height: 56px; border-radius: 50%; border: 2px solid var(--spz-orange); overflow: hidden; flex-shrink: 0; }
  .avatar-ring img { width: 100%; height: 100%; object-fit: cover; }
  .start-btn { display: inline-flex; align-items: stretch; border: 1px solid var(--spz-orange); border-radius: var(--spz-radius-3); overflow: hidden; cursor: pointer; box-shadow: var(--spz-shadow-glow-soft); transition: box-shadow var(--spz-dur-2) var(--spz-ease-out); }
  .start-btn:hover { box-shadow: 0 0 20px rgba(255,98,0,0.4), 0 0 0 1px rgba(255,98,0,0.3); }
  .start-btn-text { background: var(--spz-orange); color: #0a0a0a; font-family: var(--spz-font-display); font-weight: 700; font-size: 14px; letter-spacing: 0.06em; text-transform: uppercase; padding: 0 20px; display: flex; align-items: center; }
  .start-btn-icon { background: rgba(255,98,0,0.15); border-left: 1px solid rgba(255,98,0,0.4); display: flex; align-items: center; padding: 0 14px; color: var(--spz-orange); }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/preact@latest/dist/preact.min.js"></script>
<script src="https://unpkg.com/preact@latest/hooks/dist/hooks.umd.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin></script>
<script src="https://unpkg.com/lucide@latest"></script>

<script type="text/babel" src="components.jsx"></script>

<script type="text/babel">
/** @jsx h */
const { h, render, Fragment } = preact;
const { useState, useEffect, useRef } = preactHooks;

function formatPlaytime(seconds) {
  const hrs  = Math.floor(seconds / 3600);
  const mins = Math.floor((seconds % 3600) / 60);
  return `${String(hrs).padStart(2,'0')} HRS ${String(mins).padStart(2,'0')} MINS`;
}

function App() {
  const [visible, setVisible]   = useState(false);
  const [player, setPlayer]     = useState({});
  const [spawns, setSpawns]     = useState([]);
  const [selected, setSelected] = useState(0);
  const listRef = useRef(null);

  useEffect(() => {
    const handler = (e) => {
      const data = e.data;
      if (data.type === 'show') {
        setPlayer(data.playerData || {});
        setSpawns(data.spawns || []);
        setSelected(0);
        setVisible(true);
      } else if (data.type === 'hide') {
        setVisible(false);
      }
    };
    window.addEventListener('message', handler);
    return () => window.removeEventListener('message', handler);
  }, []);

  useEffect(() => {
    if (!visible) return;
    const onKey = (e) => {
      if (e.key === 'ArrowDown' || e.key === 's')
        setSelected(i => (i + 1) % Math.max(1, spawns.length));
      else if (e.key === 'ArrowUp' || e.key === 'w')
        setSelected(i => (i - 1 + Math.max(1, spawns.length)) % Math.max(1, spawns.length));
      else if (e.key === 'Enter') doStart();
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [visible, spawns, selected]);

  useEffect(() => {
    if (listRef.current) {
      const active = listRef.current.querySelector('.active');
      active?.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }
  }, [selected]);

  useEffect(() => { if (window.lucide) window.lucide.createIcons(); });

  const doStart = () => {
    fetch(`https://${GetParentResourceName()}/startSpawn`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ index: selected + 1 }),
    }).catch(() => {});
    setVisible(false);
  };

  if (!visible) return null;

  const licenseClass = player.licenseClass || 'D';

  return (
    <Fragment>
      <div className="player-card">
        <div style={{ background: 'var(--spz-surface-1)', border: '1px solid var(--spz-line)', borderRadius: 'var(--spz-radius-4)', boxShadow: 'var(--spz-shadow-3)', overflow: 'hidden' }}>
          <div style={{ background: 'var(--spz-surface-2)', borderBottom: '1px solid var(--spz-line)', padding: '6px 12px', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
            <span className="spz-eyebrow" style={{ color: 'var(--spz-orange)' }}>{player.stateText || 'IDLE'}</span>
            <Badge variant="orange">{licenseClass} CLASS</Badge>
          </div>
          <div style={{ padding: '14px 16px', display: 'flex', alignItems: 'center', gap: 14 }}>
            <div className="avatar-ring">
              <img src={player.avatar || 'https://i.imgur.com/8NzA8m8.png'} alt="" />
            </div>
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 4, flexWrap: 'wrap' }}>
                <span style={{ fontFamily: 'var(--spz-font-display)', fontWeight: 700, fontSize: 15, color: 'var(--spz-fg-1)', letterSpacing: '0.02em', textTransform: 'uppercase' }}>
                  {player.name || 'Racer'}
                </span>
                {player.crew && <Badge variant="orange" style={{ flexShrink: 0 }}>{player.crew}</Badge>}
              </div>
              <div style={{ display: 'flex', alignItems: 'center', gap: 6, color: 'var(--spz-fg-3)' }}>
                <Icon name="clock" size={11} />
                <span className="spz-mono" style={{ fontSize: 11 }}>{formatPlaytime(player.playtime || 0)}</span>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div className="location-panel">
        <div style={{ background: 'var(--spz-surface-1)', border: '1px solid var(--spz-line)', borderRadius: 'var(--spz-radius-4)', boxShadow: 'var(--spz-shadow-3)', overflow: 'hidden' }}>
          <div style={{ padding: '12px 14px 10px', borderBottom: '1px solid var(--spz-line)', display: 'flex', alignItems: 'center', gap: 8 }}>
            <Icon name="map-pin" size={14} style={{ color: 'var(--spz-orange)' }} />
            <span style={{ fontFamily: 'var(--spz-font-mono)', fontSize: 11, letterSpacing: '0.12em', textTransform: 'uppercase', color: 'var(--spz-fg-2)' }}>Select Deployment Zone</span>
          </div>
          <div ref={listRef} style={{ maxHeight: 220, overflowY: 'auto', padding: '6px 8px' }}>
            {spawns.map((s, i) => (
              <div key={i} className={`loc-item${i === selected ? ' active' : ''}`} onClick={() => setSelected(i)}>
                <span className="loc-num">{String(i + 1).padStart(2, '0')}</span>
                <span className="loc-name">{s.label}</span>
              </div>
            ))}
          </div>
          <div style={{ padding: '8px 12px', borderTop: '1px solid var(--spz-line)', display: 'flex', alignItems: 'center', gap: 6 }}>
            <Icon name="chevron-up" size={12} style={{ color: 'var(--spz-fg-3)' }} />
            <Icon name="chevron-down" size={12} style={{ color: 'var(--spz-fg-3)' }} />
            <span style={{ fontSize: 11, color: 'var(--spz-fg-3)' }}>navigate</span>
            <span style={{ color: 'var(--spz-fg-4)', fontSize: 11, margin: '0 2px' }}>·</span>
            <Kbd>↵</Kbd>
            <span style={{ fontSize: 11, color: 'var(--spz-fg-3)' }}>confirm</span>
          </div>
        </div>
      </div>

      <div className="start-wrap">
        <div className="start-btn" onClick={doStart} style={{ height: 44 }}>
          <div className="start-btn-text">Start</div>
          <div className="start-btn-icon">
            <Icon name="play" size={16} />
          </div>
        </div>
      </div>
    </Fragment>
  );
}

render(<App />, document.getElementById('root'));
</script>
</body>
</html>
